<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Fim</title>

    <style>

        body{
            font-family: Arial;
            background: #1a1a2e;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            margin: 0;
        }

        .card{
            background: #16213e;

            padding: 40px;

            border-radius: 20px;

            width: 500px;

            text-align: center;
        }

        a{
            display: inline-block;

            margin-top: 20px;

            background: orange;
            color: white;

            padding: 15px 30px;

            text-decoration: none;

            border-radius: 10px;
        }

    </style>

</head>
<body>

<div class="card">

    <h1>🏁 Jogo Terminado</h1>

    <div class="guardado">
      💾 Score guardado na conta de
      <strong>{{ current_user.nome }}</strong>!
      <a href="/perfil">Ver perfil →</a>
    </div>

    <h3>Máximo possível: {{ total * 100 }}</h3>

    <a href="/jogar">
        Jogar outra vez
    </a>

</div>

</body>
</html>
