<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Adivinhas{% endblock %}</title>

  <style>
    /* ─── Variáveis de tema ─────────────────────────── */
    :root {
      --fundo:   #1a1a2e;
      --cartao:  #16213e;
      --input:   #0f0e17;
      --texto:   #ffffff;
      --suave:   #888;
      /* Cor de destaque — cada página pode trocar com o bloco "accent" */
      --accent:  {% block accent %}#00d4ff{% endblock %};
    }

    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: var(--fundo);
      color: var(--texto);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    /* ─── Fundo: slideshow das fotos (comum a todas as páginas) ─── */
    .bg-slideshow {
      position: fixed; inset: 0; z-index: -2; overflow: hidden;
      background: var(--fundo);
    }
    .bg-slideshow .slide {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;          /* preenche o ecrã */
      object-position: center;
      image-orientation: from-image;  /* respeita a rotação EXIF da foto */
      opacity: 0; animation: troca 32s infinite;
    }
    .bg-slideshow .slide:nth-child(1) { animation-delay:  0s; }
    .bg-slideshow .slide:nth-child(2) { animation-delay:  8s; }
    .bg-slideshow .slide:nth-child(3) { animation-delay: 16s; }
    .bg-slideshow .slide:nth-child(4) { animation-delay: 24s; }
    /* Véu escuro por cima das fotos → mantém o texto legível */
    .bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: rgba(10,12,25,0.78);
    }
    @keyframes troca {
      0%   { opacity: 0; }
      6%   { opacity: 1; }
      25%  { opacity: 1; }
      31%  { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ─── Layout em coluna (várias caixas) ──────────── */
    .wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ─── Cartão ────────────────────────────────────── */
    .card {
      background: var(--cartao);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }
    .card.center { text-align: center; }

    /* ─── Títulos ───────────────────────────────────── */
    h1 { color: var(--accent); font-size: 1.8rem; margin: 0 0 0.3rem; }
    .sub { color: var(--suave); font-size: 0.9rem; margin-bottom: 1.5rem; }

    /* ─── Formulários ───────────────────────────────── */
    label {
      display: block; color: #aaa; font-size: 0.88rem;
      margin-bottom: 0.35rem; margin-top: 0.9rem;
    }
    input {
      width: 100%; padding: 0.75rem;
      border: 2px solid #333; border-radius: 10px;
      background: var(--input); color: white;
      font-size: 0.95rem; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    button {
      width: 100%; margin-top: 1.4rem; background: var(--accent);
      color: #0a1a2e; border: none; padding: 0.85rem;
      border-radius: 10px; font-size: 1rem; cursor: pointer;
      font-weight: bold; transition: filter 0.2s;
    }
    button:hover { filter: brightness(1.1); }

    /* ─── Botão/link grande ─────────────────────────── */
    .btn {
      display: inline-block; background: #ff6b35; color: white;
      padding: 0.9rem 1.5rem; border-radius: 10px; text-align: center;
      text-decoration: none; font-weight: bold; font-size: 1rem;
      margin-top: 1rem;
    }
    .btn:hover { filter: brightness(1.1); }

    /* ─── Barra de navegação ────────────────────────── */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--cartao); border-radius: 14px;
      padding: 0.8rem 1.2rem; font-size: 0.9rem;
    }
    .nav a { color: #aaa; text-decoration: none; margin-left: 1rem;
             transition: color 0.2s; }
    .nav a:hover { color: white; }

    /* ─── Links inline ──────────────────────────────── */
    .link { text-align: center; margin-top: 1.2rem;
            color: #666; font-size: 0.88rem; }
    .link a, a.accent { color: var(--accent); text-decoration: none; }
    .link a:hover, a.accent:hover { text-decoration: underline; }

    /* ─── Tabelas (leaderboard / histórico) ─────────── */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #555; font-size: 0.78rem;
         text-transform: uppercase; letter-spacing: 1px; padding: 0 0 0.6rem; }
    th:last-child { text-align: right; }
    td { padding: 0.55rem 0; border-top: 1px solid #1e2a3a;
         font-size: 0.92rem; color: #ccc; }
    td:last-child { text-align: right; }
    .pts-pos { color: #39ff6e; font-weight: bold; }
    .pts-neg { color: #ff4da6; font-weight: bold; }
    .vazio { color: #444; text-align: center; padding: 1.5rem 0;
             font-size: 0.9rem; }

    /* ─── Mensagens de erro (flash) ─────────────────── */
    .erro {
      background: rgba(255,77,166,0.1);
      border: 1px solid rgba(255,77,166,0.3);
      border-radius: 10px; padding: 0.7rem 1rem;
      color: #ff4da6; font-size: 0.9rem; margin-bottom: 1rem;
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

  <!-- Fundo com as fotos — definido no layout, aparece em todas as páginas -->
  <div class="bg-slideshow">
    <img class="slide" src="{{ url_for('static', filename='img/foto1.jpeg') }}" alt="">
    <img class="slide" src="{{ url_for('static', filename='img/foto2.jpeg') }}" alt="">
    <img class="slide" src="{{ url_for('static', filename='img/foto3.jpeg') }}" alt="">
    <img class="slide" src="{{ url_for('static', filename='img/foto4.jpeg') }}" alt="">
  </div>
  <div class="bg-overlay"></div>

  {% block body %}
  <div class="wrapper">
    {# Mensagens flash mostradas em todas as páginas #}
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for categoria, msg in msgs %}
        <div class="erro">⚠️ {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
  {% endblock %}

</body>
</html>
