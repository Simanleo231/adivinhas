<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>

    <style>

        body{
            font-family: Arial;
            background: #1a1a2e;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            margin: 0;
        }

        .card{
            background: #16213e;

            padding: 40px;

            border-radius: 20px;

            width: 500px;

            text-align: center;
        }

        a{
            display: inline-block;

            margin-top: 20px;

            background: orange;
            color: white;

            padding: 15px 30px;

            text-decoration: none;

            border-radius: 10px;
        }

    </style>

</head>
<body>

<div class="card">

    {% if acertou %}

        <h1>🎉 Correto!</h1>

    {% else %}

        <h1>❌ Errado!</h1>

        <h3>Resposta certa: {{ resposta_correta }}</h3>

    {% endif %}

    <h2>Pontuação: {{ pontuacao }}</h2>

    {% if proxima %}

        <a href="/pergunta">
            Próxima pergunta
        </a>

    {% else %}

        <a href="/fim">
            Ver resultado final
        </a>

    {% endif %}

</div>

</body>
</html>
