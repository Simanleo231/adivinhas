{% extends "layout.html" %}

{% block title %}Criar conta{% endblock %}
{% block accent %}#a855f7{% endblock %}

{% block extra_css %}
    button { color: white; }
{% endblock %}

{% block content %}
<div class="card">
  <h1>👤 Criar conta</h1>
  <p class="sub">Junta-te ao leaderboard!</p>

  <form action="/registo" method="POST">
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome"
           placeholder="O teu nome" maxlength="50" required autofocus>

    <label for="email">Email</label>
    <input type="email" id="email" name="email"
           placeholder="o-teu@email.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           placeholder="Mínimo 6 caracteres" minlength="6" required>

    <button type="submit">🚀 Criar conta</button>
  </form>

  <p class="link">
    Já tens conta? <a href="/login">Faz login</a>
  </p>
</div>
{% endblock %}
